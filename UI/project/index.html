    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: var(--sans, system-ui); }
    #root { width: 100%; height: 100vh; }
  </style>

<body>
  <div id="root"></div>

  <script>
    // Suppress benign ResizeObserver loop warning (browser-level, harmless).
    // It fires when observers cause layout that schedules more observers — the
    // page is unaffected but Chrome surfaces a warning. Patch RO to debounce.
    const __reMsg = 'ResizeObserver loop';
    if (window.ResizeObserver) {
      const NativeRO = window.ResizeObserver;
      window.ResizeObserver = class extends NativeRO {
        constructor(cb) {
          super((entries, observer) => {
            requestAnimationFrame(() => {
              try { cb(entries, observer); } catch (e) {}
            });
          });
        }
      };
    }
    window.addEventListener('error', (e) => {
      if (e.message && e.message.indexOf(__reMsg) !== -1) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);
    const __origOnerror = window.onerror;
    window.onerror = function(msg, ...rest) {
      if (typeof msg === 'string' && msg.indexOf(__reMsg) !== -1) return true;
      return __origOnerror ? __origOnerror.apply(this, [msg, ...rest]) : false;
    };
    const __origConsoleError = console.error.bind(console);
    console.error = function(...args) {
      if (args[0] && typeof args[0] === 'string' && args[0].indexOf(__reMsg) !== -1) return;
      __origConsoleError(...args);
    };
  </script>
